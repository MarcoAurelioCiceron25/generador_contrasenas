name: Run Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    # Definimos los permisos directamente en el Job que los necesita
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 
        uses: actions/setup-python@v5 # Actualizado a v5 para quitar la advertencia de Node
        with:
          python-version: "3.12" 

      - name: Install dependencies
        run: pip install -r requirements-dev.txt   

      - name: Check Linting
        run: flake8 .

      - name: Run tests
        run: pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Añadido por seguridad para buildx

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          # Usamos "github.repository" en minúsculas para evitar problemas de escritura
          tags: ghcr.io/marcoaureliociceron25/generador_contrasenas:latest
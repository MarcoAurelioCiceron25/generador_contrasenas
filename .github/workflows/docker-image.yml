name: Publish Docker image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/${{ github.repository_owner }}/generador_contrasenas:latest

    - name: Push Docker image
      run: docker push ghcr.io/${{ github.repository_owner }}/generador_contrasenas:latest
